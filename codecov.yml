coverage:
  status:
    project:
      default:
        target: auto
        threshold: 1%
        base: auto
        if_ci_failed: error
        only_pulls: false
    patch:
      default:
        target: 80%
        threshold: 0%
        if_ci_failed: error
        only_pulls: true

ignore:
  - 'dist/'
  - 'test/'
  - 'node_modules/'
  - '.github/'
  - 'webpack.config.js'
