name: release-please

on:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  release-please:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: googleapis/release-please-action@v5
        with:
          # RELEASE_PLEASE_TOKEN: optional PAT (contents+pull-requests scope).
          # When set, the tag created by merging the Release PR triggers
          # publish.yml automatically (GITHUB_TOKEN-pushed tags don't fire
          # other workflows). Without the PAT, releases still happen but
          # the npm publish must be triggered manually.
          token: ${{ secrets.RELEASE_PLEASE_TOKEN || secrets.GITHUB_TOKEN }}
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json
