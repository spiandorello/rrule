name: Publish to npm
on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v7
        with:
          node-version: 24.x
          registry-url: 'https://registry.npmjs.org'
          cache: 'yarn'

      - run: yarn install --frozen-lockfile

      - name: Verify tag matches package.json version
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          PKG_VERSION="$(node -p "require('./package.json').version")"
          if [ "$TAG_VERSION" != "$PKG_VERSION" ]; then
            echo "::error::Tag $GITHUB_REF_NAME (=$TAG_VERSION) does not match package.json version $PKG_VERSION"
            exit 1
          fi

      - run: yarn build

      - run: yarn test
        env:
          LANG: en_US
          TZ: America/Los_Angeles

      - name: Pack tarball
        id: pack
        run: |
          npm pack
          TARBALL=$(ls -t spiandorello-rrulejs-*.tgz | head -1)
          echo "tarball=$TARBALL" >> "$GITHUB_OUTPUT"
          echo "Packed: $TARBALL"

      - name: Smoke test packed tarball (CJS)
        run: |
          mkdir -p smoke
          cd smoke
          npm init -y > /dev/null
          npm install --no-save "../${{ steps.pack.outputs.tarball }}"
          node -e "
            const m = require('@spiandorello/rrulejs');
            const required = ['RRule', 'RRuleSet', 'rrulestr'];
            for (const k of required) {
              if (typeof m[k] === 'undefined') {
                console.error('Missing CJS export: ' + k);
                process.exit(1);
              }
            }
            console.log('CJS smoke OK');
          "

      - name: Smoke test packed tarball (ESM)
        run: |
          cd smoke
          node --input-type=module -e "
            import { RRule, RRuleSet, rrulestr } from '@spiandorello/rrulejs';
            const required = { RRule, RRuleSet, rrulestr };
            for (const [k, v] of Object.entries(required)) {
              if (typeof v === 'undefined') {
                console.error('Missing ESM export: ' + k);
                process.exit(1);
              }
            }
            console.log('ESM smoke OK');
          "

      - name: Publish
        run: npm publish "${{ steps.pack.outputs.tarball }}" --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
