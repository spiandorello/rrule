name: Node CI
on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version-file: '.nvmrc'
          cache: 'yarn'
      - run: yarn install --frozen-lockfile
      - run: yarn lint

  format-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version-file: '.nvmrc'
          cache: 'yarn'
      - run: yarn install --frozen-lockfile
      - run: yarn format-check

  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version-file: '.nvmrc'
          cache: 'yarn'
      - run: yarn install --frozen-lockfile
      - run: yarn typecheck

  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version-file: '.nvmrc'
          cache: 'yarn'
      - run: yarn install --frozen-lockfile
      - name: Audit dependencies (fail on high or critical)
        run: npx --yes audit-ci@^7 --high

  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version-file: '.nvmrc'
          cache: 'yarn'
      - run: yarn install --frozen-lockfile
      - run: yarn build
      - uses: actions/upload-artifact@v7
        with:
          name: dist
          path: dist/
          retention-days: 7

  pack-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version-file: '.nvmrc'
          cache: 'yarn'
      - run: yarn install --frozen-lockfile
      - run: yarn build
      - name: List dist/ for debugging
        run: |
          ls -la dist/
          find dist -type f | head -30
      - name: Show tarball contents
        run: npm pack --dry-run
      - name: Validate package.json against npm spec
        run: npx --yes publint --pack npm
      - name: Validate published types
        # Runs ATTW from devDependencies so the yarn `resolutions` pin of
        # fflate@0.8.2 is honored. Without that pin, fflate@0.8.3 emits
        # trailing empty chunks that crash @arethetypeswrong/core with
        # "Cannot read properties of undefined (reading 'filename')".
        # Track: https://github.com/arethetypeswrong/arethetypeswrong.github.io/issues/258
        run: yarn attw --pack .

  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node-version: [22.x, 24.x]
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'yarn'
      - run: yarn install --frozen-lockfile
      - name: Test (en_CA / Vancouver)
        env:
          LANG: en_CA
          TZ: America/Vancouver
          JEST_JUNIT_OUTPUT_NAME: junit-en_CA-vancouver-node${{ matrix.node-version }}.xml
        run: yarn test
      - name: Test (en_US / Los Angeles)
        env:
          LANG: en_US
          TZ: America/Los_Angeles
          JEST_JUNIT_OUTPUT_NAME: junit-en_US-los_angeles-node${{ matrix.node-version }}.xml
        run: yarn test
      - name: Test (sw_KE / Nairobi)
        env:
          LANG: sw_KE
          TZ: Africa/Nairobi
          JEST_JUNIT_OUTPUT_NAME: junit-sw_KE-nairobi-node${{ matrix.node-version }}.xml
        run: yarn test
      - name: Test (en_KI / Kiritimati)
        env:
          LANG: en_KI
          TZ: Pacific/Kiritimati
          JEST_JUNIT_OUTPUT_NAME: junit-en_KI-kiritimati-node${{ matrix.node-version }}.xml
        run: yarn test
      - name: Test (jp_JP / Tokyo, with coverage)
        env:
          LANG: jp_JP
          TZ: Asia/Tokyo
          JEST_JUNIT_OUTPUT_NAME: junit-jp_JP-tokyo-node${{ matrix.node-version }}.xml
        run: yarn test-ci
      - name: Upload coverage reports to Codecov
        uses: codecov/codecov-action@v7
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
      - name: Upload test results to Codecov
        if: ${{ !cancelled() }}
        uses: codecov/test-results-action@v1
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          directory: reports/junit
